<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGMAR — שמיים שנפתחים</title>
    <meta name="description" content="לא מפה שאת מקבלת — אלא שמיים שנפתחים.">
    <link rel="stylesheet" href="style_v5.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app"></div>
    <canvas id="scratch-layer" style="display:none;"></canvas>

    <!-- Sunrise Trigger -->
    <button id="btn-sunrise">לפתוח את השמיים</button>

    <!-- Dawn Transition & Epilogue -->
    <div id="dawn-overlay"></div>
    <div id="epilogue-screen">
        <h1 class="epilogue-title">השמיים נפתחו.</h1>
        <div class="epilogue-content">
            <p>
                הצורה שיצרת נשמרה בין הכוכבים.<br>
                מי שיגיע אחריך יוכל לראות אותה,<br>
                לתהות מה היא אומרת,<br>
                ולהוסיף את שלו לצד שלך.
            </p>
            <p style="margin-top: 2rem; font-size: 0.88rem; opacity: 0.55; letter-spacing: 0.08em;">
                PAGMAR — פרויקט /<br>
                [כאן תוכלי להוסיף שמך, קרדיטים, תאריך, ומידע על הפרויקט]
            </p>
        </div>
        <button id="btn-restart" class="action-btn">מסע חדש</button>
    </div>

    <script src="three_direct.js"></script>
    <script src="shapes.js"></script>
    <script src="app_v5.js"></script>
</body>
</html>
