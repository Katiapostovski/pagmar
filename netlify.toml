# ── Netlify configuration for PAGMAR ──────────
# Static HTML/CSS/JS site — no build step required.

[build]
  publish = "."
  command = ""   # no build command needed

# ── Headers: enforce UTF-8 so Hebrew text renders correctly ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type          = "text/html; charset=UTF-8"

# Correct MIME types for font files
[[headers]]
  for = "/*.otf"
  [headers.values]
    Content-Type = "font/otf"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ttf"
  [headers.values]
    Content-Type = "font/ttf"
    Cache-Control = "public, max-age=31536000, immutable"

# Cache JS and CSS aggressively
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Cache images
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects: SPA fallback (keeps Hebrew URLs working) ──────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
